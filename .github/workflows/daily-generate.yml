name: Génération quotidienne

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install numpy

      - name: Générer les données du jour
        run: python scripts/generate_daily.py

      - name: Mettre à jour la version du cache
        run: |
          sed -i "s/name=\"proximot-version\" content=\"[0-9]*\"/name=\"proximot-version\" content=\"$(date +%Y%m%d)\"/" docs/index.html

      - name: Committer et pusher
        run: |
          git config user.name "Proximot Bot"
          git config user.email "bot@proximot.local"
          git add docs/data/ docs/index.html
          if git diff --cached --quiet; then
            echo "Aucun changement"
          else
            git commit -m "Données du $(date +%Y-%m-%d)"
            git push
          fi
