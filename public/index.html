<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Proximot</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
</head>
<body>
<div id="app">
  <div id="rules-screen" class="screen hidden">
    <div class="rules-header">
      <h1>Proximot</h1>
      <button id="btn-play-top" class="btn-primary">Jouer !</button>
    </div>
    <div class="rules-content">
      <h2>Règles du jeu</h2>
      <p>Trouve les <strong>4 mots cachés</strong> de la partie !</p>
      <p>Propose un mot → tu reçois <strong>4 scores</strong> (un par mot à trouver).</p>
      <p>Plus le score est proche de 1000, plus tu es chaud 🔥</p>
      <p><strong>3 parties</strong> sont disponibles chaque jour.</p>
      <button id="btn-play-bottom" class="btn-primary">Jouer !</button>
    </div>
    <div id="recent-days" class="recent-days">
      <h3>Jours précédents</h3>
      <div id="recent-list"></div>
    </div>
  </div>

  <div id="game-screen" class="screen hidden">
    <header class="game-header">
      <div class="header-row">
        <span id="part-label">Partie 1/3</span>
        <span id="attempt-count">0 essai</span>
      </div>
      <div class="header-row">
        <div class="input-group">
          <input type="text" id="word-input" placeholder="Propose un mot..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button id="btn-submit" disabled>►</button>
        </div>
        <div id="autocomplete" class="autocomplete hidden"></div>
      </div>
    </header>

    <div id="slots" class="slots-container"></div>

    <div id="history-section" class="history-section">
      <h3>Historique</h3>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="detail-screen" class="screen hidden">
    <header class="detail-header">
      <button id="btn-back" class="btn-back">← Retour</button>
      <span id="detail-label">Mot n°1</span>
    </header>
    <div id="detail-history"></div>
  </div>

  <div id="part-complete-screen" class="screen hidden">
    <div class="complete-content">
      <h2 id="complete-title">Partie terminée !</h2>
      <div id="complete-results"></div>
      <button id="btn-next-part" class="btn-primary">Nouvelle Partie</button>
      <button id="btn-done" class="btn-secondary hidden">Reviens demain !</button>
    </div>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
